x-restart: &default-restart
  restart: always

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-deploy-medium: &deploy-medium
  deploy:
    resources:
      limits:
        cpus: '0.8'
        memory: 1.5G

x-deploy-small: &deploy-small
  deploy:
    resources:
      limits:
        cpus: '0.25'
        memory: 256M

services:
  jenkins-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: jenkins-agent
    <<: [*default-restart, *deploy-medium]
    environment:
      - JENKINS_URL=${JENKINS_URL}
      - JENKINS_AGENT_NAME=${JENKINS_AGENT_NAME}
      - JENKINS_SECRET=${JENKINS_SECRET}
      - JENKINS_WEB_SOCKET=${JENKINS_WEB_SOCKET}
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - jenkins-agent-workdir:/home/jenkins/agent
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    <<: [*default-restart, *deploy-small]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    logging: *default-logging

  promtail:
    image: grafana/promtail:3.0.0
    <<: [*default-restart, *deploy-medium]
    extra_hosts:
      - "monitor-node:${MONITOR_NODE_IP}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    logging: *default-logging

volumes:
  jenkins-agent-workdir: