x-restart: &default-restart
  restart: always

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-deploy-medium: &deploy-medium
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 512M

x-deploy-tiny: &deploy-tiny
  deploy:
    resources:
      limits:
        cpus: '0.1'
        memory: 64M

x-deploy-micro: &deploy-micro
  deploy:
    resources:
      limits:
        cpus: '0.1'
        memory: 100M

services:
  mongodb:
    image: mongo:6.0.18
    <<: [*default-restart, *deploy-medium]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    logging: *default-logging

  backend:
    build:
      context: ../../backend
    <<: [*default-restart, *deploy-medium]
    env_file:
      - ../../backend/.env
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
    logging: *default-logging

  frontend:
    build:
      context: ../../frontend
    <<: [*default-restart, *deploy-tiny]
    ports:
      - "3000:80"
    depends_on:
      - backend
    logging: *default-logging

  promtail:
    image: grafana/promtail:3.0.0
    network_mode: "host"
    <<: [*default-restart, *deploy-micro]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    <<: [*default-restart, *deploy-micro]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    logging: *default-logging

volumes:
  mongo-data: