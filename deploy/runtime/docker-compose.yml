x-restart: &default-restart
  restart: always

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-deploy-medium: &deploy-medium
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 512M

x-deploy-small: &deploy-small
  deploy:
    resources:
      limits:
        cpus: '0.25'
        memory: 256M

x-deploy-tiny: &deploy-tiny
  deploy:
    resources:
      limits:
        cpus: '0.1'
        memory: 64M

x-deploy-micro: &deploy-micro
  deploy:
    resources:
      limits:
        cpus: '0.1'
        memory: 100M

services:
  mongodb:
    image: mongo:6.0.18
    <<: [*default-restart, *deploy-medium]
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    logging: *default-logging

  backend:
    image: ${BACKEND_IMAGE}
    <<: [*default-restart, *deploy-medium]
    env_file:
      - .env.backend
    expose:
      - "5001"
    depends_on:
      - mongodb
    logging: *default-logging

  frontend:
    image: ${FRONTEND_IMAGE}
    <<: [*default-restart, *deploy-tiny]
    expose:
      - "80"
    depends_on:
      - backend
    logging: *default-logging

  nginx-lb:
    image: nginx:1.27-alpine
    <<: [*default-restart, *deploy-tiny]
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v3.0.0
    <<: [*default-restart, *deploy-small]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "cicd-node:${CICD_NODE_IP}"
    depends_on:
      - cadvisor
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.0.11
    <<: [*default-restart, *deploy-small]
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    logging: *default-logging

  loki:
    image: grafana/loki:3.0.0
    <<: [*default-restart, *deploy-small]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    logging: *default-logging

  promtail:
    image: grafana/promtail:3.0.0
    <<: [*default-restart, *deploy-micro]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    <<: [*default-restart, *deploy-micro]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    logging: *default-logging

volumes:
  mongo-data:
  prometheus-data:
  grafana-storage:
  loki-data: