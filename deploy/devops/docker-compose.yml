x-restart: &default-restart
  restart: always

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-deploy-huge: &deploy-huge
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 2.2G

x-deploy-large: &deploy-large
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 2G

x-deploy-small: &deploy-small
  deploy:
    resources:
      limits:
        cpus: '0.25'
        memory: 256M

services:
  nexus:
    image: sonatype/nexus3:3.78.2
    <<: [*default-restart, *deploy-huge]
    environment:
      - INSTALL4J_ADD_VM_PARAMS=${NEXUS_JVM_PARAMS}
    ports:
      - "8081:8081"
      - "8082:8082"
    volumes:
      - nexus-data:/nexus-data
    logging: *default-logging

  sonarqube-db:
    image: postgres:15.12-alpine
    <<: [*default-restart, *deploy-small]
    environment:
      - POSTGRES_USER=${SONAR_DB_USER}
      - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD}
      - POSTGRES_DB=${SONAR_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging: *default-logging

  sonarqube:
    image: sonarqube:10.7-community
    <<: [*default-restart, *deploy-large]
    depends_on:
      - sonarqube-db
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/${SONAR_DB_NAME}
      - SONAR_JDBC_USERNAME=${SONAR_DB_USER}
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
    logging: *default-logging

  jenkins:
    image: jenkins/jenkins:2.504.3-lts-jdk17
    <<: [*default-restart, *deploy-large]
    ports:
      - "8085:8080"
      - "50000:50000"
    user: root
    volumes:
      - jenkins-data:/var/jenkins_home
    logging: *default-logging

  jenkins-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    <<: [*default-restart, *deploy-small]
    environment:
      - JENKINS_URL=${JENKINS_URL}
      - JENKINS_AGENT_NAME=${JENKINS_AGENT_NAME}
      - JENKINS_SECRET=${JENKINS_SECRET}
      - JENKINS_WEB_SOCKET=${JENKINS_WEB_SOCKET}
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - jenkins
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    <<: [*default-restart, *deploy-small]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    logging: *default-logging

  promtail:
    image: grafana/promtail:3.0.0
    <<: [*default-restart, *deploy-small]
    extra_hosts:
      - "monitor-node:${MONITOR_NODE_IP}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    logging: *default-logging

volumes:
  nexus-data:
  postgres_data:
  sonarqube_data:
  jenkins-data: