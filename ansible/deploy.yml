- name: Configure AWS Server and Deploy App
  hosts: aws_runtime
  become: true
  tasks:
  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Install Docker and Dependencies
    apt:
      name:
      - docker.io
      - docker-compose-v2
      - rsync
      state: present

  - name: Ensure Docker is running
    systemd:
      name: docker
      state: started
      enabled: yes

  - name: Add ubuntu user to docker group
    user:
      name: ubuntu
      groups: docker
      append: yes

  - name: Create app directory
    file:
      path: /home/ubuntu/app
      state: directory
      owner: ubuntu

  - name: Copy Docker Compose file
    copy:
      src: ../deploy/runtime/docker-compose.yml
      dest: /home/ubuntu/app/docker-compose.yml
      owner: ubuntu

  - name: Restart application
    shell: |
      cd /home/ubuntu/app
      docker compose up -d --force-recreate
