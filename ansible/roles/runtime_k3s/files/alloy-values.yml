alloy:
  configMap:
    create: true
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      local.file_match "pod_logs" {
        path_targets = [{
          __path__ = "/var/log/pods/*/*/*.log",
          job      = "kubernetes-pods",
        }]
      }

      loki.source.file "pod_logs" {
        targets    = local.file_match.pod_logs.targets
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.space2study.svc.cluster.local/loki/api/v1/push"
        }
      }

controller:
  type: daemonset

serviceAccount:
  create: true

rbac:
  create: true

mounts:
  varlog: true
  extra:
  - name: pods
    mountPath: /var/log/pods
    hostPath: /var/log/pods
    readOnly: true

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 50m
    memory: 64Mi
