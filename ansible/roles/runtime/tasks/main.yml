- name: Install required packages
  apt:
    name:
    - ca-certificates
    - curl
    - gnupg
    update_cache: yes

- name: Install AWS CLI via snap
  snap:
    name: aws-cli
    classic: yes

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.gpg

- name: Convert GPG key
  shell: |
    gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Set permissions for Docker GPG key
  file:
    path: /etc/apt/keyrings/docker.gpg
    mode: "0644"

- name: Add Docker repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
    https://download.docker.com/linux/ubuntu \
    $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
    | tee /etc/apt/sources.list.d/docker.list > /dev/null

- name: Install Docker
  apt:
    name:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-compose-plugin
    update_cache: yes

- name: Enable Docker
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Add ubuntu to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Create app directory
  file:
    path: /home/ubuntu/app
    state: directory
    mode: "0755"

- name: Copy runtime files
  copy:
    src: runtime/
    dest: /home/ubuntu/app/
    owner: ubuntu
    group: ubuntu

- name: Fix directory permissions
  shell: find /home/ubuntu/app -type d -exec chmod 755 {} \;

- name: Fix file permissions
  shell: find /home/ubuntu/app -type f -exec chmod 644 {} \;

- name: Fix prometheus config permissions
  file:
    path: /home/ubuntu/app/prometheus/prometheus.yml
    mode: "0644"

- name: Login to ECR
  shell: |
    aws ecr get-login-password --region {{ aws_region }} \
    | docker login --username AWS --password-stdin {{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com
  args:
    executable: /bin/bash
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"

- name: Pull latest images from ECR
  shell: docker compose pull
  args:
    chdir: /home/ubuntu/app
    executable: /bin/bash

- name: Recreate runtime stack
  shell: docker compose up -d --force-recreate
  args:
    chdir: /home/ubuntu/app
    executable: /bin/bash
