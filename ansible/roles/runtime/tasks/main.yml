---
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
    - ca-certificates
    - curl
    - gnupg
    - python3-pip
    state: present
    update_cache: yes
  become: true

- name: Install AWS CLI via snap
  community.general.snap:
    name: aws-cli
    classic: true
  become: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Docker GPG key (as armored text)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  become: true

- name: Add Docker Repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
    filename: docker
    update_cache: yes
  become: true

- name: Force update cache again
  ansible.builtin.apt:
    update_cache: yes
  become: true

- name: Install Docker components
  ansible.builtin.apt:
    name:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-compose-plugin
    state: present
    update_cache: yes
  become: true

- name: Ensure Docker service is running and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes
  become: true

- name: Add ubuntu user to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: yes
  become: true

- name: Create application directory
  ansible.builtin.file:
    path: /home/ubuntu/app
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Sync runtime configuration files
  ansible.builtin.copy:
    src: runtime/
    dest: /home/ubuntu/app/
    owner: ubuntu
    group: ubuntu
    mode: preserve

- name: Set recursive permissions for the entire app folder
  ansible.builtin.file:
    path: /home/ubuntu/app
    state: directory
    recurse: yes
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  become: true

- name: Get temporary ECR login password
  ansible.builtin.shell: "aws ecr get-login-password --region {{ aws_region }}"
  register: ecr_password
  no_log: true
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"

- name: Authenticate Docker with AWS ECR
  ansible.builtin.shell: |
    echo "{{ ecr_password.stdout }}" | docker login --username AWS --password-stdin {{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com
  no_log: true
  become: true

- name: Pull latest images and restart services
  ansible.builtin.shell: |
    docker compose pull
    docker compose up -d --force-recreate
  args:
    chdir: /home/ubuntu/app
  become: true
