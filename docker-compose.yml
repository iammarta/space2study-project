services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db # Persist database data even if container is removed
    
  backend:
    build: ./backend
    container_name: space2study-backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=${MONGO_DB_URL} # Connect to the mongodb service container
    depends_on:
      - mongodb # Ensure database is ready before backend starts

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_BASE_PATH=${API_URL} # Pass API URL to frontend build
    container_name: space2study-frontend
    ports:
      - "${FRONTEND_PORT}:80" # Map host port 3000 to Nginx container port 80
    depends_on:
      - backend

  # --- Monitoring & Logging ---

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"    # Metrics collector for container resource usage

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml # Configuration file
    ports:
      - "9090:9090" # Time-series database for infrastructure metrics
    depends_on:
      - cadvisor

  grafana:
    image: grafana/grafana:11.0.11
    container_name: grafana
    ports:
      - "${GRAFANA_PORT}:3000" # Visualization dashboard for metrics and logs
    volumes:
      - grafana-storage:/var/lib/grafana
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus
  
  # --- Artifact Management ---

  nexus:
    image: sonatype/nexus3
    container_name: nexus
    ports:
      - "8081:8081" # UI port for Nexus administration
      - "8082:8082" # Port for Docker Hosted Repository (Artifact Management)
    volumes:
      - nexus-data:/nexus-data # Store hosted repositories and configuration

volumes:
  mongo-data: # Define named volume for data persistence
  nexus-data: # Persist Nexus artifacts (images, logs, settings)
  grafana-storage: