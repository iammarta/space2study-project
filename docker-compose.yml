# Service Reliability: ensures containers restart automatically after crashes or reboots
x-restart: &default-restart
  restart: always

# Log Rotation: prevents Docker logs from consuming all disk space on the host
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m" # Rotate when log file reaches 10MB
    max-file: "3"   # Keep only the 3 most recent log files

# Reusable Resource Templates (YAML Anchors) to enforce limits
x-deploy-medium: &deploy-medium
  deploy:
    resources:
      limits:
        cpus: '0.5' 
        memory: 512M

x-deploy-small: &deploy-small
  deploy:
    resources:
      limits:
        cpus: '0.25'
        memory: 256M

x-deploy-micro: &deploy-micro
  deploy:
    resources:
      limits:
        cpus: '0.1'
        memory: 100M

x-deploy-tiny: &deploy-tiny
  deploy:
    resources:
      limits:
        cpus: '0.1'
        memory: 64M

services:
  mongodb:
    image: mongo:6.0
    <<: [*default-restart, *deploy-medium]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db # Persist database data even if container is removed
    logging: *default-logging
    
  backend:
    build: ./backend
    <<: [*default-restart, *deploy-medium]
    ports: 
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=${MONGO_DB_URL} # Connect to the mongodb service container
    depends_on:
      - mongodb # Ensure database is ready before backend starts
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_PATH=${API_URL} # Pass API URL to frontend build
    <<: [*default-restart, *deploy-tiny]
    ports:
      - "${FRONTEND_PORT}:80" # Map host port 3000 to Nginx container port 80
    depends_on:
      - backend
    logging: *default-logging

  # --- Monitoring & Logging ---

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    <<: [*default-restart, *deploy-micro]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # Allows cAdvisor to see other containers
    ports:
      - "8080:8080"
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v3.0.0
    <<: [*default-restart, *deploy-small]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'      
      - '--storage.tsdb.retention.size=1GB'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - cadvisor
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.0.11
    <<: [*default-restart, *deploy-small]
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana-storage:/var/lib/grafana # Persist dashboards and settings across restarts
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    logging: *default-logging
    
  loki:
    image: grafana/loki:3.0.0
    <<: [*default-restart, *deploy-small]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - ./loki-data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    logging: *default-logging

  promtail:
    image: grafana/promtail:3.0.0
    <<: [*default-restart, *deploy-micro]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # To read container metadata
      - /var/lib/docker/containers:/var/lib/docker/containers:ro # To read logs
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml # Custom config
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    logging: *default-logging
  
  # --- Artifact Management ---

  nexus:
    image: sonatype/nexus3
    <<: *default-restart
    environment:
      - INSTALL4J_ADD_VM_PARAMS=${NEXUS_JVM_PARAMS}
    ports:
      - "8081:8081" # UI port for Nexus administration
      - "8082:8082" # Port for Docker Hosted Repository (Artifact Management)
    volumes:
      - nexus-data:/nexus-data # Store hosted repositories and configuration
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2.2G

volumes:
  mongo-data:
  nexus-data:
  grafana-storage: