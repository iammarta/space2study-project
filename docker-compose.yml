services:
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db # Persist database data even if container is removed
    deploy:
      resources:
        limits:
          memory: 512M
    
  backend:
    build: ./backend
# Commented out for scaling tests
    ports: # commente
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=${MONGO_DB_URL} # Connect to the mongodb service container
    depends_on:
      - mongodb # Ensure database is ready before backend starts
    labels:
      logging: "true"
      service: "backend"
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_BASE_PATH=${API_URL} # Pass API URL to frontend build
    ports:
      - "${FRONTEND_PORT}:80" # Map host port 3000 to Nginx container port 80
    depends_on:
      - backend
    labels:
      logging: "true"
      service: "frontend"

  # --- Monitoring & Logging ---

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # Allows cAdvisor to see other containers
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v3.0.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - cadvisor

  grafana:
    image: grafana/grafana:11.0.11
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana-storage:/var/lib/grafana # Persist dashboards and settings across restarts
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - default

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # To read container metadata
      - /var/lib/docker/containers:/var/lib/docker/containers:ro # To read logs
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml # Custom config
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
  
  # --- Artifact Management ---

  nexus:
    image: sonatype/nexus3
    ports:
      - "8081:8081" # UI port for Nexus administration
      - "8082:8082" # Port for Docker Hosted Repository (Artifact Management)
    volumes:
      - nexus-data:/nexus-data # Store hosted repositories and configuration
    deploy:
      resources:
        limits:
          memory: 3G

volumes:
  mongo-data: # Define named volume for data persistence
  nexus-data: # Persist Nexus artifacts (images, logs, settings)
  grafana-storage: # Save Grafana dashboards, data sources, and user settings